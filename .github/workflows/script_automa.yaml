name: cicd deploy spring angular avec github action 

on: 
  push:
    branches: main
jobs:
  buid_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code 
      uses: actions/checkout@v7

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build front-end
      run: |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/angular-app angular-app
        docker push  ${{ vars.DOCKERHUB_USERNAME }}/angular-app

    - name: build back-end
      run: |
        docker build -t ${{ vars.DOCKERHUB_USERNAME }}/spring-app springboot/app
        docker push  ${{ vars.DOCKERHUB_USERNAME }}/spring-app

    - name: lancement du docker compose 
      run: |
        docker compose up -d 
        docker compose ps -a 