services:
  angular-app:
    image: nouran10/angular-app
    container_name: angular-app
    ports:
      - "0.0.0.0:4200:80"
  spring-app:
    image: nouran10/spring-app
    container_name: spring-app
    ports:
      - "0.0.0.0:8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://192.168.187.19:3306/demo
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_MVC_CORS_MAPPING=/**
      - SPRING_MVC_CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE
      - SPRING_MVC_CORS_ALLOWED_HEADERS=*
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: mysql_container
    restart: always
    environment:
        MYSQL_DATABASE: "demo"
        MYSQL_ROOT_USERNAME: "root"
        MYSQL_ROOT_PASSWORD: "root"
    ports:
      - "0.0.0.0:3306:3306"
    volumes: 
      - demo:/var/lib/mysql
volumes:
  demo:
